<script>
  // ใส่ URL Web App ของ Apps Script ตรงนี้
  const API_BASE_URL = 'https://script.google.com/macros/s/AKfycby4_M25t5ONGnAXsUpdjQv71_6gNDFE1x6BNkyUtXgFyvuoROH9K27Ib6MJvafa8xcYDg/exec';

  let appData = { users: [], branches: [], productNames: [] };
  let currentScanTarget = '';
  let html5QrCode = null;
  let currentCameraId = null;

  document.addEventListener('DOMContentLoaded', () => {
    loadInitialData();
  });

  function showTab(tabName, btn) {
    ['inbound','outbound','stock'].forEach(t => {
      document.getElementById('tab-' + t).classList.add('hidden');
    });
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabName).classList.remove('hidden');
    btn.classList.add('active');
    if (tabName === 'stock') loadStockData();
  }

  function apiCall(action, params = {}) {
    return new Promise((resolve, reject) => {
      const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      const query = new URLSearchParams({
        action,
        callback: callbackName,
        ...params
      });

      const script = document.createElement('script');
      script.src = `${API_BASE_URL}?${query.toString()}`;

      let isDone = false;

      function cleanup() {
        if (isDone) return;
        isDone = true;
        try { delete window[callbackName]; } catch (e) {}
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[callbackName] = function(response) {
        cleanup();
        if (response && response.success) {
          resolve(response);
        } else {
          reject(new Error((response && response.message) || 'เกิดข้อผิดพลาดจาก API'));
        }
      };

      script.onerror = function() {
        cleanup();
        reject(new Error('ไม่สามารถเชื่อมต่อ API ได้'));
      };

      document.body.appendChild(script);

      setTimeout(() => {
        cleanup();
        reject(new Error('หมดเวลาการเชื่อมต่อ API'));
      }, 30000);
    });
  }

  async function loadInitialData() {
    try {
      const res = await apiCall('getInitialData');
      appData = res.data || {};
      setSelectOptions('in-user', appData.users || []);
      setSelectOptions('out-user', appData.users || []);
      setDatalistOptions('product-list', appData.productNames || []);
      loadStockData();
    } catch (err) {
      showGlobalError(err);
    }
  }

  function setSelectOptions(selectId, items) {
    const s = document.getElementById(selectId);
    s.innerHTML = '<option value="">-- เลือกผู้บันทึก --</option>';
    items.forEach(item => {
      const o = document.createElement('option');
      o.value = item;
      o.textContent = item;
      s.appendChild(o);
    });
  }

  function setDatalistOptions(listId, items) {
    const list = document.getElementById(listId);
    list.innerHTML = '';
    items.forEach(item => {
      const o = document.createElement('option');
      o.value = item;
      list.appendChild(o);
    });
  }

  async function stopScanner() {
    if (!html5QrCode) return;

    try {
      const state = html5QrCode.getState();
      if (state === Html5QrcodeScannerState.SCANNING || state === 2) {
        await html5QrCode.stop();
      }
    } catch (e) {}

    try {
      await html5QrCode.clear();
    } catch (e) {}

    html5QrCode = null;
    currentCameraId = null;

    const reader = document.getElementById('reader');
    if (reader) reader.innerHTML = '';
  }

  async function openScanner(target) {
    currentScanTarget = target;
    document.getElementById('scannerModal').style.display = 'flex';

    await stopScanner();
    html5QrCode = new Html5Qrcode("reader");

    try {
      const devices = await Html5Qrcode.getCameras();

      if (!devices || !devices.length) {
        alert('ไม่พบกล้อง');
        return;
      }

      // พยายามเลือกกล้องหลังก่อน
      const backCamera = devices.find(d => {
        const label = (d.label || '').toLowerCase();
        return (
          label.includes('back') ||
          label.includes('rear') ||
          label.includes('environment') ||
          label.includes('หลัง')
        );
      });

      const cameraId = backCamera ? backCamera.id : devices[0].id;
      currentCameraId = cameraId;

      await html5QrCode.start(
        cameraId,
        {
          fps: 10,
          qrbox: { width: 240, height: 240 },
          aspectRatio: 1.0
        },
        (decodedText) => { onScanSuccess(decodedText); },
        () => {}
      );

    } catch (err) {
      // fallback: บางเครื่อง label กล้องไม่ชัด ให้บังคับใช้กล้องหลังด้วย facingMode
      try {
        await stopScanner();
        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 240, height: 240 },
            aspectRatio: 1.0
          },
          (decodedText) => { onScanSuccess(decodedText); },
          () => {}
        );
      } catch (fallbackErr) {
        alert('ไม่สามารถเปิดกล้องได้: ' + (fallbackErr?.message || fallbackErr));
      }
    }
  }

  async function closeScanner() {
    document.getElementById('scannerModal').style.display = 'none';
    await stopScanner();
  }

  function onScanSuccess(decodedText) {
    closeScanner();
    const loc = (decodedText || '').trim();
    if (!loc) return;

    if (currentScanTarget === 'inbound') {
      document.getElementById('in-location').innerHTML = `<span class="loc-icon">📍</span> ${escapeHtml(loc)}`;
      loadProductsByLocation('inbound', loc);
    } else {
      document.getElementById('out-location').innerHTML = `<span class="loc-icon">📍</span> ${escapeHtml(loc)}`;
      loadProductsByLocation('outbound', loc);
    }
  }

  async function loadProductsByLocation(type, locationName) {
    try {
      const res = await apiCall('getProductsByLocation', { locationName });
      const items = res.data || [];

      if (type === 'inbound') renderInboundTable(items);
      else renderOutboundTable(items);
    } catch (err) {
      alert('เกิดข้อผิดพลาด: ' + getErrorMessage(err));
    }
  }

  function remainBadge(n, ss) {
    const cls = n === 0 ? 'remain-zero' : (n <= ss * 0.25 ? 'remain-low' : 'remain-ok');
    return `<span class="remain-badge ${cls}">${n}</span>`;
  }

  function renderInboundTable(items) {
    const tbody = document.getElementById('inbound-table-body');
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">📭</div><p>ไม่พบสินค้าในชั้นจัดเก็บนี้</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = items.map(item => `
      <tr>
        <td><span style="font-weight:600;">${escapeHtml(item.productName)}</span></td>
        <td>${remainBadge(item.remain, item.ss)}</td>
        <td><input type="number" min="0" step="1" class="qty-input in-qty" data-product="${escapeAttr(item.productName)}" placeholder="0"></td>
      </tr>
    `).join('');
  }

  function renderOutboundTable(items) {
    const tbody = document.getElementById('outbound-table-body');
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📭</div><p>ไม่พบสินค้าในชั้นจัดเก็บนี้</p></div></td></tr>';
      return;
    }

    const branchOpts = ['<option value="">-- สาขา --</option>']
      .concat((appData.branches || []).map(b => `<option value="${escapeAttr(b)}">${escapeHtml(b)}</option>`))
      .join('');

    tbody.innerHTML = items.map(item => `
      <tr>
        <td><span style="font-weight:600;">${escapeHtml(item.productName)}</span></td>
        <td>${remainBadge(item.remain, item.ss)}</td>
        <td><input type="number" min="0" step="1" class="qty-input out-qty" data-product="${escapeAttr(item.productName)}" placeholder="0"></td>
        <td><select class="branch-select out-branch" data-product="${escapeAttr(item.productName)}">${branchOpts}</select></td>
      </tr>
    `).join('');
  }

  async function saveInboundData() {
    const user = document.getElementById('in-user').value;
    const locationEl = document.getElementById('in-location');
    const location = locationEl.textContent.replace('📍','').trim();
    const msgBox = document.getElementById('inbound-message');

    if (!user) {
      showMessage(msgBox, '⚠️ กรุณาเลือกผู้บันทึก', 'error');
      return;
    }

    if (!location || location.includes('รอสแกน')) {
      showMessage(msgBox, '⚠️ กรุณาสแกน QR Code ชั้นจัดเก็บ', 'error');
      return;
    }

    const items = [];
    document.querySelectorAll('#inbound-table-body .in-qty').forEach(input => {
      const qty = Number(input.value || 0);
      if (qty > 0) items.push({ productName: input.dataset.product, qty });
    });

    if (!items.length) {
      showMessage(msgBox, '⚠️ กรุณาระบุจำนวนรับเข้าอย่างน้อย 1 รายการ', 'error');
      return;
    }

    try {
      const res = await apiCall('saveInbound', {
        payload: JSON.stringify({ user, location, items })
      });
      showMessage(msgBox, '✅ ' + (res.message || 'บันทึกเรียบร้อย'), 'success');
      resetInboundForm();
    } catch (err) {
      showMessage(msgBox, '❌ ' + getErrorMessage(err), 'error');
    }
  }

  async function saveOutboundData() {
    const user = document.getElementById('out-user').value;
    const locationEl = document.getElementById('out-location');
    const location = locationEl.textContent.replace('📍','').trim();
    const msgBox = document.getElementById('outbound-message');

    if (!user) {
      showMessage(msgBox, '⚠️ กรุณาเลือกผู้บันทึก', 'error');
      return;
    }

    if (!location || location.includes('รอสแกน')) {
      showMessage(msgBox, '⚠️ กรุณาสแกน QR Code ชั้นจัดเก็บ', 'error');
      return;
    }

    const items = [];
    const rows = document.querySelectorAll('#outbound-table-body tr');

    rows.forEach(row => {
      const qtyInput = row.querySelector('.out-qty');
      const branchSelect = row.querySelector('.out-branch');
      if (!qtyInput || !branchSelect) return;

      const qty = Number(qtyInput.value || 0);
      const productName = qtyInput.dataset.product;
      const branch = branchSelect.value;

      if (qty > 0) {
        items.push({ productName, qty, branch });
      }
    });

    if (!items.length) {
      showMessage(msgBox, '⚠️ กรุณาระบุจำนวนเบิกอย่างน้อย 1 รายการ', 'error');
      return;
    }

    const hasNoBranch = items.some(item => !item.branch);
    if (hasNoBranch) {
      showMessage(msgBox, '⚠️ กรุณาเลือกสาขาให้ทุกรายการที่มีการเบิก', 'error');
      return;
    }

    try {
      const res = await apiCall('saveOutbound', {
        payload: JSON.stringify({ user, location, items })
      });
      showMessage(msgBox, '✅ ' + (res.message || 'บันทึกเรียบร้อย'), 'success');
      resetOutboundForm();
    } catch (err) {
      showMessage(msgBox, '❌ ' + getErrorMessage(err), 'error');
    }
  }

  async function loadStockData() {
    const keyword = document.getElementById('stock-search').value.trim();
    const tbody = document.getElementById('stock-table-body');

    tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">⏳</div><p>กำลังโหลดข้อมูล...</p></div></td></tr>';

    try {
      const res = await apiCall('getStockData', { keyword });
      const items = res.data || [];
      renderStockTable(items);
      renderStockStats(items);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">❌</div><p>${escapeHtml(getErrorMessage(err))}</p></div></td></tr>`;
    }
  }

  function renderStockTable(items) {
    const tbody = document.getElementById('stock-table-body');
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📭</div><p>ไม่พบข้อมูลสินค้า</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = items.map(item => `
      <tr>
        <td>${escapeHtml(item.locationName || '')}</td>
        <td><span style="font-weight:600;">${escapeHtml(item.productName || '')}</span></td>
        <td>
          <div style="display:flex; align-items:center; gap:8px;">
            <span>${item.ss}</span>
            <div class="ss-bar-wrap">
              <div class="ss-bar-bg">
                <div class="ss-bar-fill" style="width:${Math.min(100, ((item.remain || 0) / Math.max(1, item.ss || 1)) * 100)}%"></div>
              </div>
            </div>
          </div>
        </td>
        <td>${remainBadge(item.remain, item.ss)}</td>
      </tr>
    `).join('');
  }

  function renderStockStats(items) {
    const wrap = document.getElementById('stock-stats');
    const total = items.length;
    const ok = items.filter(i => Number(i.remain) > Number(i.ss) * 0.25).length;
    const low = items.filter(i => Number(i.remain) > 0 && Number(i.remain) <= Number(i.ss) * 0.25).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-ok').textContent = ok;
    document.getElementById('stat-low').textContent = low;

    wrap.style.display = total ? 'grid' : 'none';
  }

  function clearStockSearch() {
    document.getElementById('stock-search').value = '';
    loadStockData();
  }

  function resetInboundForm() {
    document.getElementById('in-location').innerHTML = '<span class="loc-icon">🔍</span> รอสแกน QR Code';
    document.getElementById('inbound-table-body').innerHTML =
      '<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">📷</div><p>กรุณาสแกน QR Code ชั้นจัดเก็บ</p></div></td></tr>';
  }

  function resetOutboundForm() {
    document.getElementById('out-location').innerHTML = '<span class="loc-icon">🔍</span> รอสแกน QR Code';
    document.getElementById('outbound-table-body').innerHTML =
      '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📷</div><p>กรุณาสแกน QR Code ชั้นจัดเก็บ</p></div></td></tr>';
  }

  function showMessage(el, text, type) {
    el.innerHTML = `<div class="toast ${type}">${text}</div>`;
  }

  function getErrorMessage(err) {
    return err && err.message ? err.message : String(err || 'เกิดข้อผิดพลาด');
  }

  function showGlobalError(err) {
    alert(getErrorMessage(err));
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(str) {
    return escapeHtml(str);
  }
</script>
